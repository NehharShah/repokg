name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e .
      - run: python -m unittest discover -s tests -v
      - name: smoke test on this repo
        run: |
          repokg generate . --no-github
          test -s KNOWLEDGE_GRAPH.md && test -s .repokg/kg.json
